/* AJUSTE PARA TELA DE CELULAR */
#modalDespedida {
    width: 100vw;
    height: 100vh;
    position: fixed; /* Garante que cubra a tela toda */
    inset: 0;
    background: #000;
    z-index: 9999;
    overflow: hidden;
    touch-action: none;
}

.slide-msg {
    display: none; /* Esconde por padrão */
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    width: 100vw;
    height: 100vh;
    position: absolute;
    inset: 0;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    padding: 20px;
    box-sizing: border-box;
}

.slide-msg.active {
    display: flex; /* Só mostra o slide ativo */
    animation: zoomIn 0.6s forwards;
}

.faith-emoji { 
    position: absolute; 
    font-size: 8rem; 
    animation: emergeFaith 4s forwards; 
    z-index: 10000; 
    pointer-events: none; 
}

@keyframes emergeFaith { 
    0% { transform: scale(0) rotate(-15deg); opacity: 0; } 
    20% { opacity: 1; } 
    100% { transform: scale(2.8) rotate(15deg); opacity: 0; } 
}

#slidesDespedida h1 { 
    font-size: 2.5rem; 
    width: 90%; 
    margin: 0;
    line-height: 1.4;
    text-shadow: 0 0 15px var(--glow);
    z-index: 100;
}

/* EMOJIS E ANIMAÇÕES */
.emoji-rain span { position: absolute; font-size: 4rem; animation: fall 4s linear infinite; top: -15%; z-index: 50; opacity: 0.6; }
@keyframes fall { to{top:110%;} }

.up-emoji { position: absolute; bottom: -100px; font-size: 3.5rem; animation: riseUp 4s ease-out forwards; z-index: 60; }
@keyframes riseUp { 0% { bottom: -100px; opacity: 1; } 100% { bottom: 110%; opacity: 0; } }

.faith-emoji { position:absolute; font-size:8rem; animation: emergeFaith 4s forwards; z-index:1000; pointer-events: none; }
@keyframes emergeFaith { 0% { transform: scale(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

/* QUESTÕES EM SLIDES */
@keyframes zoomIn { from{opacity:0; transform: scale(0.9);} to{opacity:1; transform: scale(1);} }

.slide-active {
    animation: slideIn 0.5s ease-out forwards;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}


/* BOTÃO DE FECHAR */
.btn-fechar-modal {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #fff;
    font-size: 30px;
    z-index: 10001;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Efeito de Zoom Infinito */
@keyframes zoom-infinito {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

/* Efeito de Brilho Piscante */
@keyframes glow-pisca {
    0%, 100% { filter: drop-shadow(0 0 10px #fff); opacity: 1; }
    50% { filter: drop-shadow(0 0 30px #fde047); opacity: 0.8; }
}

:root { --bg: #020617; --card: #0f172a; --accent: #ccff00; --text: #f1f5f9; }

body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Segoe UI', sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: flex-start; /* Alinha no topo para não flutuar no meio */
    padding: 20px; 
    margin: 0;
}

.app-container { 
    width: 680px;

    height: auto; 
    background: var(--card);

    display: block;

button { padding: 12px 20px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
button:hover { opacity: 0.8; transform: translateY(-2px); }
        
.result-card { background: #1e293b; padding: 20px; border-radius: 12px; margin-top: 20px; display: none; border-left: 5px solid var(--accent); transition: 0.3s; }

.frase-posse { font-size: 1.2rem; font-weight: bold; color: #ccff00; cursor: pointer; text-shadow: 0 0 10px rgba(204, 255, 0, 0.5); transition: 0.3s; margin-top: 20px; text-align: center; }
.frase-posse:hover { transform: scale(1.05); }
.play-icon { color: #ccff00; font-size: 1.5rem; margin-left: 8px; vertical-align: middle; }
        
.btn-fechar { margin-top: 10px; background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; width: 100%; }
        
.btn-ranking { width: 60%; margin-top: 20px; background: #1e293b; color: var(--accent); border: 1px solid var(--accent); }

/* ESTILOS ESPECIFICOS ACAREACAO */

#questoes-area {
    position: fixed;
    inset: 0;
padding-top: -10px;
    display: none; /* O JS muda para flex quando inicia */
    align-items: center;
    justify-content: center;
    background: #020617; /* Esse é o fundo da tela toda */
    z-index: 5000;
    padding: 10px; /* Remova os 350px de padding, deixe só um respiro */
}

#card-quiz {
    width: 100%;
    max-width: 650px;
    height: 380px; /* Abaixa para caber a justificativa sem rolar tanto */
    background-color: #111827;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    padding: 20px;
    padding-top: -10px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden; /* Garante que nada saia do card */

/* Área do texto: essencial para não ter rolagem no card todo */
#pergunta-container {
height: auto; /* Deixa o texto crescer naturalmente */
    min-height: 150px; /* Garante um espaço mínimo */
    max-height: 220px; /* Limite máximo antes de começar a rolar */   
 overflow-y: auto; 
    margin-bottom: 10px;
}

.navegacao {
    margin-top: auto; /* Joga os botões para o fim do card de 380px */
    display: flex;
    justify-content: center;
    gap: 8px;
    padding-bottom: 5px;

#pergunta {

    margin-bottom: 10px;
white-space: normal; /* Garante que o texto quebre linhas */

#bloco-resposta {

/* Garante que os botões V/F tenham um tamanho legal ao descer */

#msg-justificativa {

#flash { position: fixed; inset: 0; pointer-events: none; z-index: 10001; }

@keyframes flashR { 0% { background: rgba(255, 0, 0, 0.5); } 100% { background: transparent; } }

function iniciar() {
    // Esconde o que é busca e resultado
    document.getElementById("capa").style.display = "none";
    document.getElementById("result-area").style.display = "none";
    
    document.querySelector(".app-container").style.display = "block";
    
    // Mostra as questões dentro do container
    const qArea = document.getElementById("questoes-area");
    qArea.style.display = "flex";
    qArea.classList.add("slide-active"); // Ativa a animação de entrada

    carregarQuestao();
}

function carregarQuestao() {
    subIndex = 0;
    // Sempre deixa os botões de navegação visíveis para liberdade total
    document.getElementById('btn-avancar').style.visibility = 'visible';
    
    // Inicia pela fase da prova (Como caiu na banca)
    exibirFaseProva();
}

function exibirFaseProva() {
    const q = db[index];
    const status = document.getElementById('status');
    status.innerText = "COMO CAIU NA PROVA"; // Frase destacada no topo
    status.style.color = "#FFD700"; // Cor
    status.style.textAlign = "center";   // Centraliza o texto
    status.style.fontWeight = "bold";     // Coloca em negrito
    status.style.display = "block";      // Garante que o elemento ocupe a largura total para poder centralizar
    document.getElementById('pergunta').innerText = q.prova;
    document.getElementById('bloco-resposta').innerHTML = `
 <div style="text-align: center; margin-top: 5px;">
            <button onclick="fasePlataforma()" class="btn-acao btn-opt" style="background: #EEDD82 !important; margin-top: -15px !important; color: #B8860B!important; border: 3; font-size: 1.1rem; cursor: pointer; display: inline-block; width: auto; min-width: max-content; padding: 15px 30px; white-space: normal; line-height: 1.2;">
    VER QUESTÕES SIMILARES NA PLATAFORMA
</button>
     `;
}

function fasePlataforma() {
    const q = db[index].plataforma[subIndex];
    const status = document.getElementById('status');
    const totalSimilares = db[index].plataforma.length;
    
    // 1. Atualiza o Status (Ex: 1 de 3)
    status.innerText = `COMO ESTAVA NA PLATAFORMA (${subIndex + 1} de ${totalSimilares})`;
    status.style.color = "#00d9ff";
    status.style.background = "rgba(0, 217, 255, 0.05)";
    status.style.textAlign = "center";
    status.style.fontWeight = "bold";
    status.style.display = "block";

    // 2. Exibe a pergunta similar e limpa a justificativa anterior
    document.getElementById('pergunta').innerHTML = `
        <div>${q.q}</div>
        <div id="msg-justificativa" style="display:none; margin-top:15px; font-size:0.9rem; color:#FFD700; font-style:italic; border-left: 3px solid #FFD700; padding-left:10px;">
            <b>Justificativa:</b> ${q.j}
        </div>
    `;

    // 3. Botões V e F para a similar atual
    document.getElementById('bloco-resposta').innerHTML = `
        <button id="btnV" class="btn-acao btn-opt" style="flex:1" onclick="validarSimilar(true)">VERDADEIRO</button>
        <button id="btnF" class="btn-acao btn-opt" style="flex:1" onclick="validarSimilar(false)">FALSO</button>
    `;

    // 4. Mostra os botões de navegar entre similares (que estão ao lado do Reiniciar)
    document.getElementById('btn-similar-prev').style.display = 'inline-block';
    document.getElementById('btn-similar-next').style.display = 'inline-block';
}

// 5. Função para os novos botões de "Anterior" e "Próxima" Similar
function navegarSimilar(direcao) {
    const total = db[index].plataforma.length;
    
    subIndex += direcao;

    // Impede que saia do limite das similares
    if (subIndex < 0) {
        subIndex = 0;
        return;
    }
    if (subIndex >= total) {
        subIndex = total - 1;
        return;
    }

    // Recarrega a tela com a nova similar do array
    fasePlataforma();
}

// NAVEGAÇÃO LIVRE (VOLTAR E AVANÇAR)
function avancar() {
    if (index < db.length - 1) {
        index++;
        localStorage.setItem('acareacao_index', index);
        carregarQuestao(); // Sempre reseta o estado ao navegar
    }
}

function voltar() {
    if (index > 0) {
        index--;
        localStorage.setItem('acareacao_index', index);
        carregarQuestao();
    }
}

// VALIDAÇÃO COM PISCADA TRIPLA E CORES

function validarSimilar(escolha) {
    const similarAtual = db[index].plataforma[subIndex];
    const eCorreto = (escolha === similarAtual.v);
    const flash = document.getElementById('flash');
    const btnV = document.getElementById('btnV');
    const btnF = document.getElementById('btnF');
    const campoJust = document.getElementById('msg-justificativa');

    // Desabilita para evitar cliques repetidos
    btnV.disabled = true;
    btnF.disabled = true;

    // Mostra a justificativa (sempre)
    if (campoJust) campoJust.style.display = "block";

    if (eCorreto) {
        // --- ACERTO ---
        flash.className = 'anim-g'; 
        
        // Pinta o botão clicado de VERDE (INTEIRO)
        const btnAcerto = escolha ? btnV : btnF;
        btnAcerto.style.setProperty('background-color', '#22c55e', 'important');
        btnAcerto.style.setProperty('color', '#ffffff', 'important');

        timerTransicao = setTimeout(() => {
            flash.className = '';
            proximaOuFinalizar();
        }, 10000);

   } else {
        // --- ERRO ---
        flash.className = 'anim-r'; 
        
        // Pinta o botão clicado de VERMELHO (INTEIRO)
        const btnErro = escolha ? btnV : btnF;
        btnErro.style.setProperty('background-color', '#ff0000', 'important');
        btnErro.style.setProperty('color', '#ffffff', 'important');

        clearTimeout(timerTransicao);
        
        setTimeout(() => { 
            flash.className = ''; 
            // Libera o botão "Avançar" principal para você pular quando quiser
            document.getElementById('btn-avancar').style.visibility = 'visible';
        }, 1300);
    }
}



function proximaOuFinalizar() {
    if (subIndex < db[index].plataforma.length - 1) {
        subIndex++;
        fasePlataforma();
    } else {
        const status = document.getElementById('status');
        status.innerText = "CONFERÊNCIA CONCLUÍDA";
        document.getElementById('bloco-resposta').innerHTML = `
            <div style="color:#22c55e; font-weight:bold; text-align:center;">
                QUESTÃO FINALIZADA!<br>Use as setas para navegar.
            </div>`;
        // Garante que o botão avançar apareça ao fim das similares
        document.getElementById('btn-avancar').style.visibility = 'visible';
    }
}

function validar(escolha) {
    const eCorreto = (escolha === db[index].correta);
    respostasUsuario[index] = eCorreto;
    
    // Salva a justificativa que você escreveu
    const texto = document.getElementById('texto-justificativa').value;
    justificativas[index] = texto;
    localStorage.setItem('acareacao_justificativas', JSON.stringify(justificativas));
    
    localStorage.setItem('acareacao_respostas', JSON.stringify(respostasUsuario));
    localStorage.setItem('acareacao_indice', index);

    const flash = document.getElementById('flash');
    flash.className = eCorreto ? 'anim-g' : 'anim-r';

    setTimeout(() => {
        flash.className = '';
        carregarQuestao();
    }, 1200);
}

function proximaSimilar() {
    subIndex++;
    fasePlataforma();
}

function exibirResultadoRegistrado() {
    const acertou = respostasUsuario[index];
    const status = document.getElementById('status');
    document.getElementById('area-justificativa').style.display = "block"; // Mostra justificativa no resultado

    status.innerText = acertou ? "REGISTRO: VOCÊ ACERTOU!" : "REGISTRO: VOCÊ ERROU!";
    status.style.color = acertou ? "#22c55e" : "#ff4444";
    
    document.getElementById('pergunta').innerText = db[index].prova;
    document.getElementById('bloco-resposta').innerHTML = `<div style="font-weight:bold; color:#fff">CONFERÊNCIA REALIZADA</div>`;
    document.getElementById('btn-avancar').style.visibility = 'visible';
}


function voltarHome(){
document.querySelector(".app-container").style.display = "block";
document.getElementById("capa").style.display = "block";
document.getElementById("questoes-area").style.display = "none";
}


function salvarProgresso() {
    localStorage.setItem("acareacao_indice", currentIndex);
}

function resetarAcareacao() {
    if (confirm("DESEJA REALMENTE SAIR E RECOMEÇAR A ACAREAÇÃO?")) {
        // Limpa o registro do navegador
        localStorage.removeItem("acareacao_indice");
        
        // Reseta as variáveis na memória do script
        currentIndex = 0; 
        subIndex = 0;

        // Força o salvamento do ZERO no localStorage (para evitar que o antigo volte)
        localStorage.setItem("acareacao_indice", 0);

        // Esconde os botões de similares
        const btnPrev = document.getElementById('btn-similar-prev');
        const btnNext = document.getElementById('btn-similar-next');
        if (btnPrev) btnPrev.style.display = 'none';
        if (btnNext) btnNext.style.display = 'none';

        // QUALQUER erro de memória ou estado dos botões são limpos.
        window.location.reload(); 
    }
}

let audioIniciado = false;
function handleInteraction() {
    if (!audioIniciado) {
        const audio = document.getElementById('somAplausos');
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
        audioIniciado = true;
    }
}

async function buscarCandidato() {
    const idInput = document.getElementById("inputId").value;
    const aba = document.getElementById("abaSelecionada").value;

    try {
        const res = await fetch(URL_SCRIPT + "?id=" + idInput + "&aba=" + aba);
        const data = await res.json();

        if (data.error) {
            alert("ID não encontrado nesta lista.");
            return;
        }

        // 1. Preenche os dados
        document.getElementById("res-nome").innerText = data.nome;
        document.getElementById("res-pontos").innerText = data.pontosBase;
        document.getElementById("res-col").innerText = data.colocacao + "º";
        window.pontosBase = Number(data.pontosBase);
        
        // 2. CORREÇÃO DO LAYOUT:
        // Forçamos o container pai a empilhar os elementos (Capa em cima, Resultado embaixo)
        const container = document.querySelector(".app-container");
        container.style.display = "flex";
        container.style.flexDirection = "column"; 

        // 3. Mostra o resultado garantindo que ele ocupe a largura toda
        const resultArea = document.getElementById("result-area");
        resultArea.style.display = "block";
        resultArea.style.width = "100%"; 
        resultArea.style.boxSizing = "border-box"; // Evita que o padding "estoure" a largura
        
        atualizarStatusDinamico(); 

        // Efeitos de Sucesso (Confete e Som)
        if(typeof confetti === 'function') {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
        const som = document.getElementById('somAplausos');
        if(som) som.play().catch(() => {});

    } catch (e) {
        alert("Candidato não encontrado.");
    }
}

function calcularTotal() {
    const nota = parseFloat(document.getElementById('notaProva').value) || 0;
    const total = (window.pontosBase || 0) + nota;
    document.getElementById('total-score').innerText = total.toFixed(1);
}

async function atualizarStatusDinamico() {
    const notaInput = document.getElementById('notaProva').value;
    const notaProva = parseFloat(notaInput) || 0;
    const totalSimulado = (window.pontosBase || 0) + notaProva;
    const aba = document.getElementById("abaSelecionada").value;

    const elStatus = document.getElementById("res-status");
    const elCol = document.getElementById("res-col");
    const elNome = document.getElementById("res-nome");
    const card = document.getElementById("result-area");

    try {
        const res = await fetch(URL_SCRIPT + "?aba=" + aba + "&simularTotal=" + totalSimulado);
        const data = await res.json();
        const novaPosicao = data.posicao;

        if (elCol) elCol.innerText = novaPosicao + "º";

        let limiteVagas = { "F-Ampla": 510, "F-Cotas": 136, "F-PCD": 34, "S-Ampla": 107, "S-Cotas": 28, "S-PCD": 7, "J-Ampla": 107, "J-Cotas": 28, "J-PCD": 7 }[aba];

        const nomeLimpo = data.nome || elNome.innerText.replace(/🥇|🥈/g, "").trim();

        if (novaPosicao <= limiteVagas) {
            elStatus.innerText = "Vaga Imediata";
            elStatus.style.color = "#ccff00"; 
            elNome.innerHTML = '🥇 ' + nomeLimpo;
            card.className = "result-card status-vaga";
            card.style.display = "block";
            if(notaInput) lancarFesta();
        } else {
            elStatus.innerText = "Cadastro Reserva";
            elStatus.style.color = "#94a3b8";
            elNome.innerHTML = '🥈 ' + nomeLimpo;
            card.className = "result-card status-cr";
            card.style.display = "block";
        }
    } catch (e) { console.error(e); }
}

// Reutilizando a lógica de Fogos do Script de Natal
const canvas = document.getElementById('fwCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function createFirework(x, y) {
    const color = `hsl(${Math.random() * 360}, 100%, 75%)`;
    for (let i = 0; i < 20; i++) {
        const angle = (Math.PI * 2 / 20) * i;
        particles.push({ x, y, vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4, opacity: 1, color });
    }
}
function updateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.opacity -= 0.02;
        ctx.globalAlpha = p.opacity; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2); ctx.fill();
        if (p.opacity <= 0) particles.splice(i, 1);
    });
    if (Math.random() < 0.05) createFirework(Math.random()*canvas.width, Math.random()*canvas.height/2);
    requestAnimationFrame(updateParticles);
}

function iniciarBlindagem() {
    const targetDate = new Date();
    targetDate.setHours(17, 0, 0, 0); // Define para as 17:00 de hoje

    // Se já passou das 17h, não faz nada
    if (new Date() > targetDate) {
        document.getElementById('blindagem-container').style.display = 'none';
        return;
    }

    const frases = [
        "93 acertos não são por acaso, Kallel.",
        "O sistema está pronto, e você também.",
        "A resiliência de 16 meses te trouxe até aqui.",
        "Respire. O nome já está escrito na lista.",
        "O cara que fortalece todos também merece paz.",
        "Faltam poucas horas para o grito de posse.",
        "A medalha de ouro já tem dono."
    ];

    function update() {
        const agora = new Date();
        const diff = targetDate - agora;

        if (diff <= 0) {
            document.getElementById('countdown-timer').innerText = "CHEGOU A HORA!";
            document.getElementById('progress-bar').style.width = "100%";
            return;
        }

        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        document.getElementById('countdown-timer').innerText = 
            `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

        // Cálculo de progresso (baseado no dia de hoje, das 07h às 17h)
        const inicioDia = new Date(); inicioDia.setHours(7, 0, 0, 0);
        const totalMs = targetDate - inicioDia;
        const decorridoMs = agora - inicioDia;
        const porc = Math.max(0, Math.min(100, (decorridoMs / totalMs) * 100));
        document.getElementById('progress-bar').style.width = porc + "%";

        // Troca a frase a cada 1 minuto (quando os segundos zeram)
        if (s === 0) {
            const novaFrase = frases[Math.floor(Math.random() * frases.length)];
            document.getElementById('frase-blindagem').innerText = `"${novaFrase}"`;
        }
    }

    setInterval(update, 1000);
    update();
}
