<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kallel - Acareação Oficial</title>
    <style>
        :root {
            --bg: #000;
            --container-bg: #020617;
            --verde-limao: #ccff00;
            --azul-iluminado: #00d9ff;
            --escarlate: #ff0000;
            --sucesso: #22c55e;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; }

        body { 
            margin: 0; background: var(--bg); 
            font-family: 'Inter', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; color: var(--text-white); overflow: hidden; 
        }

        #container { 
            width: 800px; height: 500px; 
            background: var(--container-bg); 
            border-radius: 18px; padding: 25px; 
            position: relative; border: 2px solid rgba(255,255,255,.1); 
            box-shadow: 0 20px 50px rgba(0,0,0,.5); 
            display: flex; flex-direction: column; 
        }

        #capa {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        h1.iluminado { 
            color: var(--verde-limao); font-size: 3.5rem; margin: 0; 
            font-weight: 900; letter-spacing: 2px;
            text-shadow: 0 0 25px rgba(204, 255, 0, 0.7);
        }

        .sub.iluminado { 
            color: var(--azul-iluminado); font-size: 1.2rem; font-weight: 700;
            text-transform: uppercase; margin-bottom: 40px;
            text-shadow: 0 0 15px rgba(0, 217, 255, 0.6);
        }

        #questoes-area { display: none; flex: 1; flex-direction: column; }

        .topo-msg {
            text-align: center; font-weight: 800; font-size: 1rem;
            padding: 8px; border-radius: 6px; margin-bottom: 10px;
            text-transform: uppercase;
        }

        #pergunta {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.02); border-radius: 12px;
            padding: 25px; font-size: 1.2rem; line-height: 1.5;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }

        .controles-resposta { display: flex; gap: 10px; margin-top: 15px; height: 60px; }

        .navegacao { display: flex; gap: 15px; margin-top: 14px; height: 45px; }

        .btn-acao {
            background: #1e293b; color: #fff; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-opt { flex: 2; font-size: 1rem; }
        .btn-home { flex: 0.6; font-size: 1.3rem; background: #0f172a; }
        .btn-nav { flex: 1; font-size: 0.8rem; background: #020617; border: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); }
        .btn-nav:hover { background: #1e293b; color: #fff; }

        #btn-avancar { visibility: hidden; color: var(--azul-iluminado); border-color: var(--azul-iluminado); }

        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; opacity: 0;
        }
        @keyframes flash-g { 0%, 100% { opacity: 0; } 50% { opacity: 0.6; background: #22c55e; } }
        @keyframes flash-r { 0%, 100% { opacity: 0; } 50% { opacity: 0.7; background: #ff0000; } }
        .anim-g { animation: flash-g 0.2s ease-in-out 3; }
        .anim-r { animation: flash-r 0.25s ease-in-out 3; }
    </style>
</head>
<body>

<div id="container">
    <div id="flash"></div>

    <div id="capa">
        <h1 class="iluminado">ACAREAÇÃO</h1>
        <div class="sub iluminado">MÉDIA DE ASSERTIVIDADE - 89 QUESTÕES</div>
        <button class="btn-acao" style="padding: 15px 40px; background: #22c55e" onclick="iniciar()">Iniciar Conferência</button>
    </div>

    <div id="questoes-area">
        <div id="status" class="topo-msg"></div>
        <div id="pergunta"></div>
        <div id="bloco-resposta" class="controles-resposta"></div>
        <div class="navegacao">
            <button class="btn-acao btn-nav" onclick="voltar()">⬅ Voltar</button>
            <button id="btn-avancar" class="btn-acao btn-nav" onclick="avancar()">Avançar ➡</button>
        </div>
    </div>
</div>

   // Tenta carregar o progresso salvo, se não existir, começa do zero
    let index = parseInt(localStorage.getItem('acareacao_index')) || 0;
    let respostasUsuario = JSON.parse(localStorage.getItem('acareacao_respostas')) || []; 

    function iniciar() {
        document.getElementById('capa').style.display = 'none';
        document.getElementById('questoes-area').style.display = 'flex';
        carregarQuestao();
    }

    function carregarQuestao() {
        if (respostasUsuario[index] !== undefined) {
            exibirResultadoRegistrado();
        } else {
            faseProva();
        }
    }

    function faseProva() {
        subIndex = 0; 
        document.getElementById('btn-avancar').style.visibility = 'hidden';
        const status = document.getElementById('status');
        status.innerText = "Como Caiu na Prova";
        status.style.color = "#f59e0b";
        status.style.background = "rgba(245, 158, 11, 0.05)";

        document.getElementById('pergunta').innerText = db[index].prova;
        document.getElementById('bloco-resposta').innerHTML = 
            `<button class="btn-acao btn-opt" style="flex:1" onclick="fasePlataforma()">Similares na Plataforma</button>`;
    }

    function fasePlataforma() {
        const status = document.getElementById('status');
        status.innerText = `COMO ESTAVA NA PLATAFORMA (${subIndex + 1} de ${db[index].plataforma.length})`;
        status.style.color = "#00d9ff"; 
        status.style.background = "rgba(0, 217, 255, 0.05)";

        document.getElementById('pergunta').innerText = db[index].plataforma[subIndex];

        if (subIndex < db[index].plataforma.length - 1) {
            document.getElementById('bloco-resposta').innerHTML = `
                <button class="btn-acao btn-opt" style="flex:1; border-color: #ccff00" onclick="proximaSimilar()">SIMILARES DA PLATAFORMA</button>
            `;
        } else {
            document.getElementById('bloco-resposta').innerHTML = `
                <button id="btnV" class="btn-acao btn-opt" onclick="validar(true)">🦸‍♂️💪 É UM PROFETA? 💪🦸‍♂️</button>
                <button class="btn-acao btn-home" onclick="location.reload()">🏠</button>
                <button id="btnF" class="btn-acao btn-opt" onclick="validar(false)">😈🤦‍♂️ FEZ FOI UM PACTO! 🤦‍♂️😈</button>
            `;
        }
    }

    function proximaSimilar() {
        subIndex++;
        fasePlataforma();
    }

    function exibirResultadoRegistrado() {
        const acertou = respostasUsuario[index];
        const status = document.getElementById('status');
        
        status.innerText = acertou ? "REGISTRO: VOCÊ ACERTOU!" : "REGISTRO: VOCÊ ERROU!";
        status.style.color = acertou ? "#22c55e" : "#ff0000";
        status.style.background = "rgba(255, 255, 255, 0.05)";
        
        document.getElementById('pergunta').innerText = db[index].prova;
        document.getElementById('bloco-resposta').innerHTML = `
            <div style="flex:1; display:flex; align-items:center; justify-content:center; font-weight:900; color:${acertou ? '#22c55e' : '#ff0000'}">
                CONFERÊNCIA JÁ REALIZADA
            </div>
            <button class="btn-acao btn-home" onclick="location.reload()">🏠</button>
        `;
        document.getElementById('btn-avancar').style.visibility = 'visible';
    }

    function validar(escolha) {
        const eCorreto = (escolha === db[index].correta);
        respostasUsuario[index] = eCorreto; 
salvarProgresso();

        const flash = document.getElementById('flash');
        if(eCorreto) {
            flash.classList.add('anim-g');
            document.getElementById(escolha ? 'btnV' : 'btnF').style.background = "#22c55e";
        } else {
            flash.classList.add('anim-r');
            document.getElementById(escolha ? 'btnV' : 'btnF').style.background = "#ff0000";
        }

        setTimeout(() => { 
            flash.classList.remove('anim-g', 'anim-r'); 
            avancar(); 
        }, 1200);
    }

    function avancar() {
        if(index < db.length - 1) {
            index++;
salvarProgresso();
            carregarQuestao();
        } else {
            alert("Fim da acareação!");
        }
    }

    function voltar() {
        if(index > 0) {
            index--;
salvarProgresso();
            carregarQuestao();
        }
    }
function salvarProgresso() {
        localStorage.setItem('acareacao_index', index);
        localStorage.setItem('acareacao_respostas', JSON.stringify(respostasUsuario));
    }

    // Opcional: Função para você resetar tudo quando quiser começar do zero absoluto
    function resetarTudo() {
        if(confirm("Deseja apagar todo o histórico e começar da questão 1?")) {
            localStorage.clear();
            location.reload();
        }
    }

</script>
</body>
</html>
