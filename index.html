/* AJUSTE PARA TELA DE CELULAR */
#modalDespedida {
    width: 100vw;

    inset: 0;
    background: #000;
    z-index: 9999;
    overflow: hidden;
    touch-action: none;
}

.slide-msg {
    display: none; /* Esconde por padrão */
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    width: 100vw;
    height: 100vh;
    position: absolute;
    inset: 0;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    padding: 20px;
    box-sizing: border-box;
}

.slide-msg.active {
    display: flex; /* Só mostra o slide ativo */
    animation: zoomIn 0.6s forwards;
}

.faith-emoji { 
    position: absolute; 
    font-size: 8rem; 
    animation: emergeFaith 4s forwards; 
    z-index: 10000; 
    pointer-events: none; 
}

@keyframes emergeFaith { 
    0% { transform: scale(0) rotate(-15deg); opacity: 0; } 
    20% { opacity: 1; } 
    100% { transform: scale(2.8) rotate(15deg); opacity: 0; } 
}

#slidesDespedida h1 { 
    font-size: 2.5rem; 
    width: 90%; 
    margin: 0;
    line-height: 1.4;
    text-shadow: 0 0 15px var(--glow);
    z-index: 100;
}

/* EMOJIS E ANIMAÇÕES */
.emoji-rain span { position: absolute; font-size: 4rem; animation: fall 4s linear infinite; top: -15%; z-index: 50; opacity: 0.6; }
@keyframes fall { to{top:110%;} }

.up-emoji { position: absolute; bottom: -100px; font-size: 3.5rem; animation: riseUp 4s ease-out forwards; z-index: 60; }
@keyframes riseUp { 0% { bottom: -100px; opacity: 1; } 100% { bottom: 110%; opacity: 0; } }

.faith-emoji { position:absolute; font-size:8rem; animation: emergeFaith 4s forwards; z-index:1000; pointer-events: none; }
@keyframes emergeFaith { 0% { transform: scale(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

/* QUESTÕES EM SLIDES */
@keyframes zoomIn { from{opacity:0; transform: scale(0.9);} to{opacity:1; transform: scale(1);} }

.slide-active {
    animation: slideIn 0.5s ease-out forwards;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}


/* BOTÃO DE FECHAR */
.btn-fechar-modal {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #fff;
    font-size: 30px;
    z-index: 10001;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Efeito de Zoom Infinito */
@keyframes zoom-infinito {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

/* Efeito de Brilho Piscante */
@keyframes glow-pisca {
    0%, 100% { filter: drop-shadow(0 0 10px #fff); opacity: 1; }
    50% { filter: drop-shadow(0 0 30px #fde047); opacity: 0.8; }
}

:root { --bg: #020617; --card: #0f172a; --accent: #ccff00; --text: #f1f5f9; }

/* 1. O SEGREDO DO ENCAIXE: Força todos os elementos a calcularem margens para dentro */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Segoe UI', sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: flex-start; 
    width: 100%;
    min-height: 100vh;
    overflow-x: hidden; /* Corta qualquer vazamento horizontal pela raiz */
    padding: 20px; /* Esse padding só vai valer para computadores/telas grandes */
}

.app-container { 
    width: 100%; 
    max-width: 540px; 
    flex-shrink: 0;
    height: auto; 
    
    /* Mantém a presença firme na capa antes da injeção de dados */
    min-height: 250px; 
    
    background: var(--card); 
    padding: 25px; 
    border-radius: 15px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
    border: 1px solid #1e293b;
    display: block; 
}

/* 2. O COMANDO DO CELULAR (Cravado na Borda) */
@media (max-width: 600px) {
    body {
        padding: 0; /* Remove a margem externa do fundo, colando o sistema na tela */
    }
    
    .app-container {
        /* Transforma o container em tela cheia (estilo app nativo) */
        min-height: 100vh; 
        
        border-radius: 0; /* Tira o arredondamento, cravando as quinas na borda do aparelho */
        border-left: none; /* Remove a borda lateral para não somar 1px e estourar a tela */
        border-right: none;
        
        /* Ajuste do respiro interno para o texto não encostar nas laterais */
        padding: 20px 15px; 
    }
}


/* Ajuste tático para as telas menores (celulares) */
@media (max-width: 600px) {
    .app-container {
        /* Reduzimos o recuo interno para ganhar mais espaço útil de leitura para as questões */
        padding: 15px; 
        
        /* Suaviza o arredondamento para combinar melhor com margens estreitas */
        border-radius: 10px; 
    }
}

function iniciar() {
    // Esconde o que é busca e resultado
    document.getElementById("capa").style.display = "none";
    document.getElementById("result-area").style.display = "none";
    
    document.querySelector(".app-container").style.display = "block";
    
    // Mostra as questões dentro do container
    const qArea = document.getElementById("questoes-area");
    qArea.style.display = "flex";
    qArea.classList.add("slide-active"); // Ativa a animação de entrada

    carregarQuestao();
}

function carregarQuestao() {
    subIndex = 0;
    // Sempre deixa os botões de navegação visíveis para liberdade total
    document.getElementById('btn-avancar').style.visibility = 'visible';
    
    // Inicia pela fase da prova (Como caiu na banca)
    exibirFaseProva();
}

function exibirFaseProva() {
    const q = db[index];
    const status = document.getElementById('status');
    status.innerText = "COMO CAIU NA PROVA"; // Frase destacada no topo
    status.style.color = "#FFD700"; // Cor
    status.style.textAlign = "center";   // Centraliza o texto
    status.style.fontWeight = "bold";     // Coloca em negrito
    status.style.display = "block";      // Garante que o elemento ocupe a largura total para poder centralizar
    document.getElementById('pergunta').innerText = q.prova;
    document.getElementById('bloco-resposta').innerHTML = `
 <div style="text-align: center; margin-top: 5px;">
            <button onclick="fasePlataforma()" class="btn-acao btn-opt" style="background: #EEDD82 !important; margin-top: -15px !important; color: #B8860B!important; border: 3; font-size: 1.1rem; cursor: pointer; display: inline-block; width: auto; min-width: max-content; padding: 15px 30px; white-space: normal; line-height: 1.2;">
    VER QUESTÕES SIMILARES NA PLATAFORMA
</button>
     `;
}

function fasePlataforma() {
    const q = db[index].plataforma[subIndex];
    const status = document.getElementById('status');
    const totalSimilares = db[index].plataforma.length;
    
    // 1. Atualiza o Status (Ex: 1 de 3)
    status.innerText = `COMO ESTAVA NA PLATAFORMA (${subIndex + 1} de ${totalSimilares})`;
    status.style.color = "#00d9ff";
    status.style.background = "rgba(0, 217, 255, 0.05)";
    status.style.textAlign = "center";
    status.style.fontWeight = "bold";
    status.style.display = "block";

    // 2. Exibe a pergunta similar e limpa a justificativa anterior
    document.getElementById('pergunta').innerHTML = `
        <div>${q.q}</div>
        <div id="msg-justificativa" style="display:none; margin-top:15px; font-size:0.9rem; color:#FFD700; font-style:italic; border-left: 3px solid #FFD700; padding-left:10px;">
            <b>Justificativa:</b> ${q.j}
        </div>
    `;

    // 3. Botões V e F para a similar atual
    document.getElementById('bloco-resposta').innerHTML = `
        <button id="btnV" class="btn-acao btn-opt" style="flex:1" onclick="validarSimilar(true)">VERDADEIRO</button>
        <button id="btnF" class="btn-acao btn-opt" style="flex:1" onclick="validarSimilar(false)">FALSO</button>
    `;

    // 4. Mostra os botões de navegar entre similares (que estão ao lado do Reiniciar)
    document.getElementById('btn-similar-prev').style.display = 'inline-block';
    document.getElementById('btn-similar-next').style.display = 'inline-block';
}

// 5. Função para os novos botões de "Anterior" e "Próxima" Similar
function navegarSimilar(direcao) {
    const total = db[index].plataforma.length;
    
    subIndex += direcao;

    // Impede que saia do limite das similares
    if (subIndex < 0) {
        subIndex = 0;
        return;
    }
    if (subIndex >= total) {
        subIndex = total - 1;
        return;
    }

    // Recarrega a tela com a nova similar do array
    fasePlataforma();
}

// NAVEGAÇÃO LIVRE (VOLTAR E AVANÇAR)
function avancar() {
    if (index < db.length - 1) {
        index++;
        localStorage.setItem('acareacao_index', index);
        carregarQuestao(); // Sempre reseta o estado ao navegar
    }
}

function voltar() {
    if (index > 0) {
        index--;
        localStorage.setItem('acareacao_index', index);
        carregarQuestao();
    }
}

// VALIDAÇÃO COM PISCADA TRIPLA E CORES

function validarSimilar(escolha) {
    const similarAtual = db[index].plataforma[subIndex];
    const eCorreto = (escolha === similarAtual.v);
    const flash = document.getElementById('flash');
    const btnV = document.getElementById('btnV');
    const btnF = document.getElementById('btnF');
    const campoJust = document.getElementById('msg-justificativa');

    // Desabilita para evitar cliques repetidos
    btnV.disabled = true;
    btnF.disabled = true;

    // Mostra a justificativa (sempre)
    if (campoJust) campoJust.style.display = "block";

    if (eCorreto) {
        // --- ACERTO ---
        flash.className = 'anim-g'; 
        
        // Pinta o botão clicado de VERDE (INTEIRO)
        const btnAcerto = escolha ? btnV : btnF;
        btnAcerto.style.setProperty('background-color', '#22c55e', 'important');
        btnAcerto.style.setProperty('color', '#ffffff', 'important');

        timerTransicao = setTimeout(() => {
            flash.className = '';
            proximaOuFinalizar();
        }, 10000);

   } else {
        // --- ERRO ---
        flash.className = 'anim-r'; 
        
        // Pinta o botão clicado de VERMELHO (INTEIRO)
        const btnErro = escolha ? btnV : btnF;
        btnErro.style.setProperty('background-color', '#ff0000', 'important');

// Reutilizando a lógica de Fogos do Script de Natal
const canvas = document.getElementById('fwCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function createFirework(x, y) {
    const color = `hsl(${Math.random() * 360}, 100%, 75%)`;
    for (let i = 0; i < 20; i++) {
        const angle = (Math.PI * 2 / 20) * i;
        particles.push({ x, y, vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4, opacity: 1, color });
    }
}
function updateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.opacity -= 0.02;
        ctx.globalAlpha = p.opacity; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2); ctx.fill();
        if (p.opacity <= 0) particles.splice(i, 1);
    });
    if (Math.random() < 0.05) createFirework(Math.random()*canvas.width, Math.random()*canvas.height/2);
    requestAnimationFrame(updateParticles);
}

function iniciarBlindagem() {
    const targetDate = new Date();
    targetDate.setHours(17, 0, 0, 0); // Define para as 17:00 de hoje

    // Se já passou das 17h, não faz nada
    if (new Date() > targetDate) {
        document.getElementById('blindagem-container').style.display = 'none';
        return;
    }

    const frases = [
        "93 acertos não são por acaso, Kallel.",
        "O sistema está pronto, e você também.",
        "A resiliência de 16 meses te trouxe até aqui.",
        "Respire. O nome já está escrito na lista.",
        "O cara que fortalece todos também merece paz.",
        "Faltam poucas horas para o grito de posse.",
        "A medalha de ouro já tem dono."
    ];

    function update() {
        const agora = new Date();
        const diff = targetDate - agora;

        if (diff <= 0) {
            document.getElementById('countdown-timer').innerText = "CHEGOU A HORA!";
            document.getElementById('progress-bar').style.width = "100%";
            return;
        }

        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        document.getElementById('countdown-timer').innerText = 
            `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

        // Cálculo de progresso (baseado no dia de hoje, das 07h às 17h)
        const inicioDia = new Date(); inicioDia.setHours(7, 0, 0, 0);
        const totalMs = targetDate - inicioDia;
        const decorridoMs = agora - inicioDia;
        const porc = Math.max(0, Math.min(100, (decorridoMs / totalMs) * 100));
        document.getElementById('progress-bar').style.width = porc + "%";

        // Troca a frase a cada 1 minuto (quando os segundos zeram)
        if (s === 0) {
            const novaFrase = frases[Math.floor(Math.random() * frases.length)];
            document.getElementById('frase-blindagem').innerText = `"${novaFrase}"`;
        }
    }

    setInterval(update, 1000);
    update();
}

        subIndex = novoIndex;
        fasePlataforma(); // Recarrega a tela com a nova similar

// 1. VARIÁVEL GLOBAL PARA O MOTOR DE NAVEGAÇÃO
let indiceAtual = -1;

// 2. A FUNÇÃO DE BUSCA (Agora ela só busca e descobre o número da linha)
function buscarCandidato() {
    const inputElement = document.getElementById("inputNome");
    
    if (!inputElement || inputElement.value.trim() === "") {
        alert("Eu não tenho bola de cristal, se você não digitar nada eu não tenho como saber quem é você.");
        return;
    }

    // Função interna ninja ATUALIZADA (à prova de falhas)
    const limparTexto = (texto) => {
        if (!texto) return ""; 
        return String(texto)
            .normalize("NFD")                  
            .replace(/[\u0300-\u036f]/g, "")   
            .replace(/\s+/g, " ")              
            .trim()
            .toLowerCase();
    };

    const nomeDigitado = limparTexto(inputElement.value);

    // A MÁGICA AQUI: Trocamos .find() por .findIndex() para saber exatamente a posição do candidato na lista
    const indexEncontrado = bancoDeAprovados.findIndex(u => {
        const nomeLimpo = limparTexto(u.nome);
        return nomeLimpo.includes(nomeDigitado) || nomeDigitado.includes(nomeLimpo);
    });

    if (indexEncontrado === -1) {
        alert("Não sabe escrever seu nome? Digite-o novamente com ou sem acento.");
        return;
    }

    // Atualiza a posição atual e manda renderizar a tela
    indiceAtual = indexEncontrado;
    carregarCandidatoNaTela(indiceAtual);
}


// 3. A FUNÇÃO QUE DESENHA NA TELA (Pode ser chamada pela busca ou pelos botões)
function carregarCandidatoNaTela(index) {
    const pessoa = bancoDeAprovados[index];
    console.log("Candidato carregado:", pessoa);

    // 1. PREENCHE OS DADOS NO HTML
    const elNome = document.getElementById("res-nome");
    if (elNome) elNome.innerText = pessoa.nome || "--";

    const elPontos = document.getElementById("res-pontos");
    if (elPontos) elPontos.innerText = pessoa.pontos || "--";

    const elCidade = document.getElementById("res-cidade");
    if (elCidade) elCidade.innerText = pessoa.cidade || "--";

    const elTipo = document.getElementById("res-tipo");
    if (elTipo) elTipo.innerText = pessoa.tipo || "--";

    // 2. MOSTRA O RESULTADO NA TELA
    const container = document.querySelector(".app-container");
    if (container) {
        container.style.display = "flex";
        container.style.flexDirection = "column"; 
    }

    const resultArea = document.getElementById("result-area");
    if (resultArea) {
        resultArea.style.display = "block";
        resultArea.style.width = "100%"; 
        resultArea.style.boxSizing = "border-box";
    }

    // 3. LÓGICA DE STATUS, CORES E MEDALHAS
    let medalha = '';
    let statusFinal = '';
    let animacao = ''; 
    let corStatus = '';
    const statusLower = String(pessoa.status || "").toLowerCase();

    if (statusLower.includes("convocado")) {
        medalha = '🥇';
        statusFinal = 'CONVOCADO';
        corStatus = '#22c55e'; // Verde
        animacao = 't1';
    } 
    else if (statusLower.includes("imediata")) {
        medalha = '🥇';
        statusFinal = 'CONVOCAÇÃO IMINENTE';
        corStatus = '#f59e0b'; // Amarelo/Laranja
        animacao = 'imediata'; 
    } 
    else if (statusLower.includes("cadastro reserva") || statusLower.includes("cr")) {
        medalha = '🥈';
        statusFinal = 'CR - NA EXPECTATIVA';
        corStatus = '#3b82f6'; // Azul
        animacao = 'cr'; 
    }
    else if (statusLower.includes("desistente")) {
        medalha = '❌';
        statusFinal = 'DESISTENTE';
        corStatus = '#ef4444'; // Vermelho
        animacao = 'nenhuma';
    } 

    const elCol = document.getElementById("res-col");
    if (elCol) {
        elCol.innerText = `${medalha} ${pessoa.colocacao || ""}`;
    }
    
    const statusEl = document.getElementById('status-situacao');
    if (statusEl) {
        statusEl.textContent = statusFinal;
        statusEl.style.color = corStatus;
    }

    // 4. DISPARO DAS ANIMAÇÕES
    const som = document.getElementById('somAplausos');
    if(som) {
        som.pause();
        som.currentTime = 0;
    }

    if (animacao === 't1') {
        if(som) som.play().catch(() => {});
        if(typeof confetti === 'function') {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    } else if (animacao === 'imediata') {
        if(som) som.play().catch(() => {});
    } else if (animacao === 'cr') {
        if(typeof chuvaDeEsperanca === 'function') {
            chuvaDeEsperanca(['🕊️','🙌','🙏']);
        }
    }
}


// 4. CONTROLES DE NAVEGAÇÃO DOS BOTÕES
document.getElementById('btnAnterior').addEventListener('click', function() {
    if (indiceAtual > 0) {
        indiceAtual--;
        carregarCandidatoNaTela(indiceAtual);
    }
});

document.getElementById('btnProximo').addEventListener('click', function() {
    if (indiceAtual >= 0 && indiceAtual < bancoDeAprovados.length - 1) {
        indiceAtual++;
        carregarCandidatoNaTela(indiceAtual);
    }
});


// 5. FUNÇÃO DE EMOJIS INDEPENDENTE DE CSS EXTERNO
function chuvaDeEsperanca(emojis) {
    for(let i = 0; i < 25; i++) {
        setTimeout(() => {
            const span = document.createElement('div'); 
            span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            
            // Estilização injetada diretamente
            span.style.position = 'fixed';
            span.style.fontSize = (3 + Math.random() * 2) + 'rem'; // Tamanhos variados
            span.style.zIndex = '999999'; // Acima de tudo
            span.style.pointerEvents = 'none';
            span.style.left = (5 + Math.random() * 85) + 'vw'; // Posição horizontal aleatória
            span.style.bottom = '-10vh'; // Nasce abaixo da tela
            span.style.opacity = '1';
            span.style.transition = 'bottom 4s ease-out, opacity 4s ease-in-out';
            
            document.body.appendChild(span);
            
            // Força um pequeno atraso para o navegador aplicar a transição
            requestAnimationFrame(() => {
                span.style.bottom = '110vh'; // Sobe até passar da tela
                span.style.opacity = '0';
            });

            // Remove o elemento após o fim da animação
            setTimeout(() => span.remove(), 4000);
        }, i * 150); // Emojis surgem em intervalos de 150ms
    }
}

 async function registrarVisitanteAura() {
    try {
        // Alterado para o novo namespace exclusivo: projeto-aura-leitura
        const urlAPI = 'https://api.counterapi.dev/v1/projeto-seas/acessos/up';
        
        const resposta = await fetch(urlAPI);
        const dados = await resposta.json();
        
        const elContador = document.getElementById('contador-seas');
        if (elContador) {
            // Formata o número para o padrão brasileiro (ex: 1.250)
            elContador.innerText = dados.count.toLocaleString('pt-BR');
        }
    } catch (erro) {
        console.error("Falha ao carregar contador de acessos.", erro);
        const elContador = document.getElementById('contador-global');
        if (elContador) elContador.innerText = "ONLINE"; // Fallback discreto
    }
}
